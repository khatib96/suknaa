# Suknaa — Local Development Docker Compose
# Usage: docker compose -f infrastructure/docker-compose.yml up -d
# Stop:  docker compose -f infrastructure/docker-compose.yml down

services:

  postgres:
    image: postgis/postgis:16-3.4
    container_name: suknaa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: suknaa_dev
      POSTGRES_USER: suknaa
      POSTGRES_PASSWORD: suknaa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suknaa -d suknaa_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: suknaa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: suknaa_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: suknaa_minio
      MINIO_ROOT_PASSWORD: suknaa_minio_password
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
